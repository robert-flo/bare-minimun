name: CI

on:
  push:
    branches:
      - dev
      - master
      - rc
  pull_request:

jobs:
  pre-commit:
    name: Run Pre-Commit Hooks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run Pre-Commit Hooks
        uses: pre-commit/action@v3.0.1
